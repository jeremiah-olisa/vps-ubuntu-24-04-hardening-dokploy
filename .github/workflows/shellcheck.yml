name: ShellCheck

on:
  push:
    branches: [main]
    paths: ['*.sh']
  pull_request:
    branches: [main]
    paths: ['*.sh']

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -x -s bash -S warning setup.sh cleanup.sh check.sh install-dokploy.sh purge.sh

      - name: Syntax check
        run: |
          for f in setup.sh cleanup.sh check.sh install-dokploy.sh purge.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done
