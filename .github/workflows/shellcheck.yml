name: ShellCheck

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -x -s bash -S warning setup.sh cleanup.sh check.sh install-dokploy.sh purge.sh allow-docker-port.sh remove-docker-port.sh

      - name: Syntax check
        run: |
          for f in setup.sh cleanup.sh check.sh install-dokploy.sh purge.sh allow-docker-port.sh remove-docker-port.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done

      - name: Verify Gum GPG fingerprint consistency
        run: |
          set -euo pipefail

          scripts=(setup.sh cleanup.sh check.sh purge.sh)
          expected=""

          for script in "${scripts[@]}"; do
            fp=$(awk -F'"' '/EXPECTED_FP=/{print $2; exit}' "$script")
            if [ -z "$fp" ]; then
              echo "::error file=$script::Missing EXPECTED_FP for Gum installer"
              exit 1
            fi

            if [ -z "$expected" ]; then
              expected="$fp"
            elif [ "$fp" != "$expected" ]; then
              echo "::error file=$script::Gum EXPECTED_FP differs from the other scripts"
              echo "Expected: $expected"
              echo "Got:      $fp"
              exit 1
            fi
          done

          echo "Gum EXPECTED_FP is consistent across: ${scripts[*]}"
